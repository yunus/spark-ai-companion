<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        .chat-header {
            background-color: #4f46e5;
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: 600;
            border-top-left-radius: 1.5rem;
            border-top-right-radius: 1.5rem;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #e0e7ff;
            color: #1e40af;
            align-self: flex-end;
            border-bottom-right-radius: 0.5rem;
        }

        .bot-message {
            background-color: #f3f4f6;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 0.5rem;
        }

        .message-timestamp {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.25rem;
        }

        .input-container {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-top: 1px solid #e5e7eb;
            background-color: #ffffff;
            gap: 0.5rem;
        }

        textarea {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 9999px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: #4f46e5;
        }

        .action-button {
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 9999px;
            background-color: #4f46e5;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .action-button:hover {
            background-color: #4338ca;
        }

        .action-button-disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1s infinite;
        }
        
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .screenshare-message {
            font-size: 0.875rem;
            color: #4b5563;
            text-align: center;
            font-style: italic;
            margin-top: 0.5rem;
        }

        .audio-player-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background-color: #e0e7ff;
            padding: 0.5rem 0.75rem;
            border-radius: 1.25rem;
        }
    </style>
</head>

            }
