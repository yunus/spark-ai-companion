<!doctype html>
<html>
  <head>
    <title>ADK Streaming Test (Audio)</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/js/app.js" type="module"></script>
  </head>

  <body>
    <h1>ADK Streaming Test</h1>
    <div id="messages"></div>
    <br />

    <form id="messageForm">
      <label for="message">Message:</label>
      <input type="text" id="message" name="message" />
      <button type="submit" id="sendButton" disabled>
        <span class="material-icons">send</span>
        <span>Send</span>
      </button>
      
      <div class="button-group">
        <button type="button" id="audioButton">
          <span class="material-icons">mic</span>
          <span>Start Audio</span>
        </button>
        <button type="button" id="screenButton">
          <span class="material-icons">screen_share</span>
          <span>Start Screen Sharing</span>
        </button>
      </div>
    </form>
    <video id="screenShareVideo" class="hidden" autoplay playsinline></video>
  </body>

</html>
