<!doctype html>
<html>
  <head>
    <title>ADK Streaming Test (Audio)</title>
    <script src="/static/js/app.js" type="module"></script>
    <style>
      .hidden {
        display: none;
      }
      #screenShareVideo {
        max-width: 100%;
        margin-top: 10px;
        border: 1px solid #ccc;
      }
      #messages {
        height: 500px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 5px;
        background-color: #f9f9f9;
        margin: 10px 0;
      }
    </style>
  </head>

  <body>
    <h1>ADK Streaming Test</h1>
    <div id="messages"></div>
    <br />

    <form id="messageForm">
      <label for="message">Message:</label>
      <input type="text" id="message" name="message" />
      <button type="submit" id="sendButton" disabled>Send</button>
      <button type="button" id="startAudioButton">Start Audio</button>
      <button type="button" id="startScreenButton">Start Screen Sharing</button>
      <button type="button" id="stopScreenButton" class="hidden">Stop Screen Sharing</button>
    </form>
    <video id="screenShareVideo" class="hidden" autoplay playsinline></video>
  </body>

</html>
